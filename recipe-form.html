<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Форма за добавяне на рецепта във Вкусно.bg.">
    <title>Добави рецепта | Вкусно.bg</title>
  </head>
  <body>
    <div class="top-bar py-2">
      <div class="container d-flex flex-wrap justify-content-between gap-2">
        <span><i class="bi bi-calendar-heart"></i> Нови рецепти всеки ден</span>
        <span class="d-flex gap-3">
          <a href="index.html#categories"><i class="bi bi-grid"></i> Категории</a>
          <a href="login.html"><i class="bi bi-person-circle"></i> Вход</a>
        </span>
      </div>
    </div>

    <nav class="navbar navbar-expand-lg bg-white sticky-top site-navbar">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html"><span class="brand-mark"><i class="bi bi-egg-fried"></i></span>Вкусно.bg</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Отвори меню">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" data-nav href="index.html">Рецепти</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#categories">Категории</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#top">Топ рецепти</a></li>
            <li class="nav-item"><a class="nav-link" data-nav href="recipe-form.html">Добави рецепта</a></li>
            <li class="nav-item"><a class="nav-link" data-nav href="profile.html">Профил</a></li>
            <li class="nav-item"><a class="nav-link" data-nav href="admin.html">Админ</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container page-shell">
      <div class="section-title">
        <div>
          <p class="eyebrow mb-1">Нова публикация</p>
          <h1>Добави рецепта</h1>
        </div>
      </div>

      <form data-recipe-form>
        <div class="row g-4">
          <div class="col-lg-8">
            <div class="content-panel">
              <div class="mb-3">
                <label class="form-label" for="title">Име на рецептата</label>
                <input class="form-control" id="title" type="text" placeholder="Например: Пълнени чушки с ориз" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="description">Кратко описание</label>
                <textarea class="form-control" id="description" rows="3" required></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label" for="ingredients">Продукти</label>
                <textarea class="form-control" id="ingredients" rows="6" placeholder="Всеки продукт на нов ред" required></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label" for="steps">Начин на приготвяне</label>
                <textarea class="form-control" id="steps" rows="7" placeholder="Опиши стъпките ясно и последователно" required></textarea>
              </div>
            </div>
          </div>
          <aside class="col-lg-4">
            <div class="portal-panel mb-3">
              <h2 class="portal-panel-title"><i class="bi bi-sliders"></i> Данни за рецепта</h2>
              <div class="mb-3">
                <label class="form-label" for="category">Категория</label>
                <select class="form-select" id="category" required>
                  <option value="">Избери</option>
                  <option>Салати</option>
                  <option>Супи</option>
                  <option>Основни ястия</option>
                  <option>Постни ястия</option>
                  <option>Традиционни</option>
                  <option>Десерти</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label" for="time">Време в минути</label>
                <input class="form-control" id="time" type="number" min="5" step="5" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="difficulty">Трудност</label>
                <select class="form-select" id="difficulty" required>
                  <option>Лесна</option>
                  <option>Средна</option>
                  <option>Трудна</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label" for="image">Снимка</label>
                <input class="form-control" id="image" type="url" placeholder="https://...">
              </div>
              <div class="alert alert-success d-none" data-form-alert role="alert"></div>
              <button class="btn btn-success w-100" type="submit">
                <i class="bi bi-send"></i>
                Публикувай
              </button>
            </div>
          </aside>
        </div>
      </form>
    </main>

    <footer class="site-footer pt-5">
      <div class="container">
        <div class="footer-bottom py-3 d-flex flex-column flex-md-row justify-content-between gap-2">
          <span>© 2026 Вкусно.bg</span>
          <span>Статична форма за рецепти</span>
        </div>
      </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
