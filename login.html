<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Вход във Вкусно.bg.">
    <title>Вход | Вкусно.bg</title>
    <link rel="stylesheet" href="/src/app.css">
    <style>body[data-page-access]:not([data-auth-ready="true"]) main,body[data-page-access]:not([data-auth-ready="true"]) footer{visibility:hidden}</style>
  </head>
  <body data-page-access="guest">
    <div class="top-bar py-2">
      <div class="container d-flex flex-wrap justify-content-between gap-2">
        <span><i class="bi bi-calendar-heart"></i> Нови рецепти всеки ден</span>
        <a href="index.html"><i class="bi bi-arrow-left"></i> Към рецепти</a>
      </div>
    </div>

    <nav class="navbar navbar-expand-lg bg-white site-navbar">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html"><span class="brand-mark"><i class="bi bi-egg-fried"></i></span>Вкусно.bg</a>
        <div data-auth-nav>
          <a class="btn btn-outline-success btn-sm" href="register.html">Регистрация</a>
        </div>
      </div>
    </nav>

    <main class="auth-page">
      <div class="container">
        <section class="auth-panel">
          <p class="eyebrow mb-1">Потребителски профил</p>
          <h1 class="h3 fw-bold">Вход в профила</h1>
          <p class="form-hint">Демо форма за потребители, които искат да запазват и публикуват рецепти.</p>
          <form class="mt-4" data-login-form>
            <div class="mb-3">
              <label class="form-label" for="email">Имейл</label>
              <input class="form-control" id="email" type="email" autocomplete="email" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Парола</label>
              <input class="form-control" id="password" type="password" autocomplete="current-password" required>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember">Запомни ме</label>
              </div>
              <a class="link-success" href="#">Забравена парола</a>
            </div>
            <div class="alert d-none" data-form-alert role="alert"></div>
            <button class="btn btn-success w-100" type="submit" data-submit-button>Вход</button>
          </form>
        </section>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
