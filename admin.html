<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Административен панел за рецепти във Вкусно.">
    <title>Админ | Вкусно</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html"><i class="bi bi-egg-fried"></i>Вкусно</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Отвори меню">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" data-nav href="index.html">Рецепти</a></li>
            <li class="nav-item"><a class="nav-link" data-nav href="recipe-form.html">Добави рецепта</a></li>
            <li class="nav-item"><a class="nav-link" data-nav href="profile.html">Профил</a></li>
            <li class="nav-item"><a class="nav-link" data-nav href="admin.html">Админ</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container page-shell">
      <div class="section-title">
        <div>
          <p class="text-success fw-bold small text-uppercase mb-1">Управление</p>
          <h1>Административен панел</h1>
        </div>
        <a class="btn btn-success" href="recipe-form.html">
          <i class="bi bi-plus-circle"></i>
          Нова рецепта
        </a>
      </div>

      <section class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="content-panel">
            <span class="text-secondary">Всички рецепти</span>
            <strong class="d-block fs-2">48</strong>
          </div>
        </div>
        <div class="col-md-4">
          <div class="content-panel">
            <span class="text-secondary">Чакащи преглед</span>
            <strong class="d-block fs-2">6</strong>
          </div>
        </div>
        <div class="col-md-4">
          <div class="content-panel">
            <span class="text-secondary">Потребители</span>
            <strong class="d-block fs-2">132</strong>
          </div>
        </div>
      </section>

      <section class="content-panel">
        <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3">
          <h2 class="h4 mb-0">Последни рецепти</h2>
          <div class="input-group" style="max-width: 320px;">
            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
            <input class="form-control" type="search" placeholder="Филтрирай">
          </div>
        </div>
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Рецепта</th>
                <th>Категория</th>
                <th>Автор</th>
                <th>Статус</th>
                <th class="text-end">Действия</th>
              </tr>
            </thead>
            <tbody data-admin-recipes></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
